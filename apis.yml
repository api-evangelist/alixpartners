description: >-
  AlixPartners is a global consulting firm founded in 1981 in Detroit, with
  over 3,500 people across more than 40 countries, specializing in turnaround
  and restructuring, corporate performance improvement, M&A, investigations,
  and digital/AI transformation. AlixPartners does not publish a public
  developer portal or REST API surface; technology value is delivered through
  client-specific engagements, proprietary tools such as the AI Profit Engine
  for retail and the Rapid G&A Diagnostic, and a flagship public thought
  leadership surface anchored by the annual AlixPartners Disruption Index
  (3,200+ executives across 11 countries and 10 industries) and the AlixTalks
  podcast (RSS via Podbean). Public consumption is via the alixpartners.com
  website, downloadable PDF reports, an email subscription preference center,
  and the AlixTalks Podbean RSS feed.
