      - name: Chapter 11 Restructuring
        description: Bankruptcy reorganization and creditor advisory engagements.
      - name: Performance Improvement
        description: Cost reduction, working capital, and EBITDA improvement programs for corporates and PE portfolio companies.
      - name: Retail Demand Forecasting
        description: Machine-learning-driven demand, pricing, inventory, and marketing optimization delivered via the AI Profit Engine.
      - name: Private Equity Value Creation
        description: Diligence, 100-day, and value creation advisory across the PE portfolio lifecycle.
      - name: Tariff and Geopolitical Scenario Planning
        description: Real-time what-if and scenario modeling for tariffs, supply chain risk, and geopolitics, often surfaced through the AI Profit Engine and Disruption Index.
      - name: Disputes and Litigation Support
        description: Forensic, valuation, and expert testimony services for complex disputes.
      - name: Enterprise Risk Assessment
        description: Risk readiness benchmarking informed by the annual U.S. Risk Survey and Disruption Index.
  - type: Integrations
    data:
      - name: Palantir Foundry
        description: AlixPartners delivers data integration and analytics on Palantir Foundry, leveraging its 250+ connectors for rapid enterprise data unification.
      - name: Microsoft Azure and Microsoft 365
        description: Cloud, AI, and productivity transformation delivered on Microsoft Azure and Microsoft 365.
      - name: Alteryx
        description: Data analytics and workflow automation; over 600 AlixPartners colleagues trained, used in 100+ client engagements, with native integration to AWS, SQL, PowerBI, Databricks, and 150+ platforms.
      - name: Cien.ai
        description: AI-driven B2B sales force effectiveness diagnostics integrated into Growth practice engagements.
      - name: BoostUp
        description: AI-enabled revenue command center for forecasting, deal inspection, and sales coaching.
      - name: FULLY AI
        description: Berylls by AlixPartners Americas partnership extending automotive-focused AI advisory capabilities.
      - name: World Economic Forum Intelligence
        description: AlixPartners insights surfaced through the WEF Intelligence platform via the Disruption Navigator.
