  - type: Features
    data:
      - name: AlixPartners Disruption Index
        description: >-
          Annual flagship research surveying 3,200+ senior executives across 11
          countries and 10 industries; 2026 is the seventh edition. Headline
          quote: "Normal is over. Disruption is the new economic driver."
          Available as a downloadable PDF report plus on-site interactive
          summary at /disruption-index/.
      - name: AI Profit Engine
        description: >-
          Proprietary retail platform that integrates "hundreds of internal and
          external data sources" into a machine-learning model to forecast
          customer and revenue demand and optimize pricing/promotions,
          assortment/inventory, and marketing/loyalty. Delivered through
          AlixPartners consulting engagements rather than as a public SaaS API.
      - name: Rapid G&A Diagnostic
        description: >-
          Proprietary organizational assessment tool used in the Organizational
          Transformation practice to identify cost-out opportunities across
          general and administrative functions.
      - name: Organizational Health Diagnostic
        description: >-
          Proprietary workforce and performance evaluation tool used in the
          Transformative Leadership practice.
      - name: AlixTalks Podcast
        description: >-
          Video and podcast series hosted by Executive Chairman Simon Freakley
          featuring conversations with senior business and policy leaders about
          managing accelerating disruption. Published via Podbean with a public
          RSS feed at https://feed.podbean.com/alixtalks/feed.xml.
      - name: AlixTalks Insights Series
        description: >-
          Web-published companion content to the podcast under
          /alixtalks/ covering boardroom, globalization, company culture,
          proactive transformation, and chaos-to-opportunity series episodes.
      - name: Annual Outlook Reports
        description: >-
          Recurring research products including the 2026 Enterprise Software
          Predictions Report, 2026 U.S. Risk Survey ("Risk is accelerating
          faster than readiness"), and 2026 Aerospace & Defense Outlook,
          published as PDFs and on-site insight pages.
      - name: Email Subscription Preferences
        description: >-
          Public subscription preference center at /forms/subscribe/ for
          receiving AlixPartners insights, event invitations, and research
          updates by email.
      - name: The Hornet Newsletter
        description: >-
          LinkedIn newsletter authored by Co-CEO Rob Hornby covering AI,
          disruption, and corporate performance commentary.
      - name: Disruption Navigator
        description: >-
          Curated AlixPartners insights surfaced through the World Economic
          Forum Intelligence platform as a complement to the Disruption Index.
      - name: Berylls by AlixPartners
        description: >-
          Automotive-focused strategy unit operating under the AlixPartners
          brand; recently announced an Americas partnership with FULLY AI to
          extend automotive AI advisory capabilities.
      - name: AlixPartners GitHub Organization
        description: >-
          Public GitHub org at github.com/alixpartners with 2 public
          repositories (a fork of docs/custom-agents-template and a fork of
          backslash-security/scan-action). No first-party open source SDKs or
          APIs are published.
  - type: Services
    data:
      - name: Turnaround and Restructuring
        description: Core historical practice covering distressed company turnarounds, restructurings, and bankruptcy reorganization.
      - name: Corporate Strategy and Transformation
        description: Strategic and organizational change advisory aimed at unlocking shareholder value.
      - name: Organizational Transformation
        description: Restructuring of operating models and G&A optimization, often using the Rapid G&A Diagnostic.
      - name: Office of the CFO
        description: Finance transformation across strategy, operations, technology, and compliance.
      - name: Mergers and Acquisitions
        description: Deal support across the transaction lifecycle from diligence through post-merger integration.
      - name: Investigations, Disputes and Advisory Services
        description: Forensic analysis, expert witness testimony, and dispute advisory services.
      - name: Cybersecurity
        description: Cyber resilience services focused on protecting corporate value.
      - name: Data Governance
        description: Custom solutions for eDiscovery, client data platforms, and data analytics.
      - name: Environmental, Social and Governance
        description: ESG integration advisory across industries.
      - name: Growth
        description: Revenue expansion, pricing, and go-to-market advisory.
      - name: Supply Chain Management and Operations
        description: Procurement and manufacturing efficiency advisory using AI tools and platforms.
      - name: Technology
        description: Tech M&A, operating-model transformations, and tech cost optimization.
      - name: Artificial Intelligence
        description: Advanced analytics, machine learning, and generative AI advisory and implementation.
      - name: Transformative Leadership
        description: Leadership development and organizational health diagnostics for senior teams.
